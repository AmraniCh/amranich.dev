name: 🚀 Deployment via FTPS

on:
  push:
    tags:
      - '*'
  workflow_dispatch: 

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:2.8.12

      - name: ℹ️ Check PHP Version
        run: php -v

      - name: ℹ️ Check Composer Version
        run: composer -V

      - name: 📦 Install dependencies for PHP
        run: composer install --prefer-dist --no-progress

      - name: ⭐ Setup NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: ⚙️ Run production
        run: npm run prod

      - name: 📦 Install dependencies for email sending PHP script
        working-directory: ./build_production/backend
        run: composer install

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.ftp_hostname }}
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          port: ${{ secrets.ftp_port }}
          local-dir: ./build_production/
          server-dir: ${{ secrets.ftp_server_dir }}
          protocol: ftps
          timeout: 60000

      - name: 🔐 Fix permissions via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ssh_host }}
          username: ${{ secrets.ssh_user }}
          key: ${{ secrets.ssh_private_key }}
          port: ${{ secrets.ssh_port }}
          script: |
            sudo chown -R ${{ secrets.ftp_username }}:www-data ${{ secrets.ftp_server_dir }}
            sudo chmod -R 755 ${{ secrets.ftp_server_dir }}